name: Release Multi Platform

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: linux-x64
            ext: ""
          - os: macos-latest
            asset_name: macos-x64
            ext: ""
          - os: windows-latest
            asset_name: windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.6"

      - name: Build & Compile (Bun)
        shell: bash
        run: |
          set -euo pipefail

          # Build frontend
          bun install --no-frozen-lockfile
          VITE_IS_DOCKER=true bun --smol run build

          # Build backend Golang
          go mod download
          go build -o apimq${{ matrix.ext }} main.go
          chmod +x ./apimq${{ matrix.ext }} || true

          # Move to release folder
          mkdir -p release
          mv ./apimq${{ matrix.ext }} ./release/apimq-${{ matrix.asset_name }}${{ matrix.ext }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: apimq-${{ matrix.asset_name }}
          path: release/apimq-${{ matrix.asset_name }}${{ matrix.ext }}

  docker_hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/apimq:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/apimq:latest

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/apimq
          readme-filepath: README.md

      - name: Wait 5 seconds
        run: sleep 5

      - name: Trigger remote deploy API
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            "https://c00l.molinar.id/api/v1/deploy?uuid=${{ secrets.COOLIFY_UUID }}&force=false"
          echo "Deployed successfully: https://apimq.molinar.id"

  github_release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/apimq-*
